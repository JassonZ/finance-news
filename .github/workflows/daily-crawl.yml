name: Daily Finance News Crawler

on:
  schedule:
    # 每天 8:30 北京时间执行 (0:30 UTC)
    - cron: '30 0 * * *'
  workflow_dispatch:  # 支持手动触发

jobs:
  crawl-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install dependencies
        run: |
          cd crawler
          npm install
          
      - name: Run crawler
        run: |
          cd crawler
          node index.js
        env:
          FINNHUB_KEY: ${{ secrets.FINNHUB_KEY }}
          ALPHA_KEY: ${{ secrets.ALPHA_KEY }}
          
      - name: Copy news to web
        run: |
          cp crawler/news.json web/public/
          
      - name: Commit and Push
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add web/public/news.json
          git commit -m "Update news data $(date '+%Y-%m-%d %H:%M')" || exit 0
          git push
